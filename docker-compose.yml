services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: signal_lab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 25s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/signal_lab?schema=public
      PORT: "3001"
      # Браузер шлёт разный Origin для localhost vs 127.0.0.1 — нужны оба
      WEB_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      LOG_LEVEL: info
      # В .env задай SIGNAL_LAB_SENTRY_DSN — имя без коллизии с пустым SENTRY_DSN в Windows PATH/env
      SENTRY_DSN: ${SIGNAL_LAB_SENTRY_DSN:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3001/api/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
        NEXT_PUBLIC_LOKI_URL: http://localhost:3100
        NEXT_PUBLIC_PROMETHEUS_URL: http://localhost:9090
        NEXT_PUBLIC_METRICS_URL: http://localhost:3001/metrics
        GRAFANA_INTERNAL_URL: http://grafana:3000
    environment:
      GRAFANA_INTERNAL_URL: http://grafana:3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
      grafana:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy

  loki:
    image: grafana/loki:2.9.8
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.8
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/promtail/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3010:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  pgdata:
